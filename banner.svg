<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#0E1A2B"/>
    </linearGradient>
    <linearGradient id="lineglow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E75B6" stop-opacity="0"/>
      <stop offset="60%" stop-color="#3FA9F5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3FA9F5" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="900" height="220" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="900" height="220" fill="url(#bg)"/>

    <!-- faint grid -->
    <g stroke="#1E2A3E" stroke-width="1">
      <line x1="0" y1="55" x2="900" y2="55"/>
      <line x1="0" y1="110" x2="900" y2="110"/>
      <line x1="0" y1="165" x2="900" y2="165"/>
      <line x1="150" y1="0" x2="150" y2="220"/>
      <line x1="300" y1="0" x2="300" y2="220"/>
      <line x1="450" y1="0" x2="450" y2="220"/>
      <line x1="600" y1="0" x2="600" y2="220"/>
      <line x1="750" y1="0" x2="750" y2="220"/>
    </g>

    <!-- animated price line (draw-in) -->
    <path id="priceline" d="M0,150 L60,140 L110,155 L160,120 L220,132 L270,95 L330,108 L390,70 L450,85 L510,55 L570,68 L630,40 L690,58 L750,30 L810,45 L900,20"
          fill="none" stroke="url(#lineglow)" stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="1400" stroke-dashoffset="1400">
      <animate attributeName="stroke-dashoffset" from="1400" to="0" dur="2.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </path>

    <!-- moving cursor dot at line's leading edge -->
    <circle r="4" fill="#3FA9F5">
      <animateMotion dur="2.6s" fill="freeze"
        path="M0,150 L60,140 L110,155 L160,120 L220,132 L270,95 L330,108 L390,70 L450,85 L510,55 L570,68 L630,40 L690,58 L750,30 L810,45 L900,20"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="2.6s" fill="freeze"/>
    </circle>

    <!-- name, typewriter reveal -->
    <text x="40" y="95" font-family="'Courier New', monospace" font-size="34" font-weight="700" fill="#F5F7FA">
      Vignesh Kumar U
      <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- subtitle typing effect -->
    <text x="40" y="125" font-family="'Courier New', monospace" font-size="15" fill="#8FA6BF">
      <tspan>quant researcher</tspan><tspan fill="#3FA9F5"> · </tspan><tspan>ai/ml engineer</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- blinking cursor after subtitle -->
    <rect x="330" y="112" width="9" height="16" fill="#3FA9F5">
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- ticker readout bottom-left -->
    <text x="40" y="185" font-family="'Courier New', monospace" font-size="12" fill="#5A7089">
      WQBRAIN
      <tspan fill="#2ECC71"> +1.00%</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.5s" fill="freeze"/>
    </text>
    <text x="40" y="203" font-family="'Courier New', monospace" font-size="12" fill="#5A7089">
      IEEE · 2 PAPERS
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.5s" fill="freeze"/>
    </text>

    <!-- right-side stat readout -->
    <text x="740" y="185" font-family="'Courier New', monospace" font-size="12" fill="#5A7089" text-anchor="end">
      TOP 1% · 292,000+
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.5s" fill="freeze"/>
    </text>
    <text x="740" y="203" font-family="'Courier New', monospace" font-size="12" fill="#5A7089" text-anchor="end">
      B.TECH AI/DS · 2026
      <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.5s" fill="freeze"/>
    </text>
  </g>
</svg>
